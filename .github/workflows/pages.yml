name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-leptos
        id: cache-cargo-leptos
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-leptos
          key: ${{ runner.os }}-cargo-leptos-0.3.6

      - name: Install cargo-leptos
        if: steps.cache-cargo-leptos.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos@0.3.6

      - name: Validate content
        run: cargo test --lib --test content_validation

      - name: Build static assets
        run: cargo leptos build --release

      - name: Export static pages
        run: PV_EXPORT_STATIC=1 target/release/pv-root-cause

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
